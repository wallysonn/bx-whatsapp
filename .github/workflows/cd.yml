name: Node.js CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy using ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            PREBUILD=~/bx-application/prebuild/bx-whatsapp
            RELEASES_DIR=~/bx-application/releases/bx-whatsapp
            SERVICE=~/bx-application/services/bx-whatsapp
            RELEASE_NAME=$(date +"%Y%m%d_%H%M%S")
            RELEASE_FILE="$RELEASES_DIR/$RELEASE_NAME.tar.gz"

            mkdir -p $RELEASES_DIR $SERVICE

            # ── 1. Pull e build ───────────────────────────────────────────
            echo ">>> Pulling from github..."
            cd $PREBUILD
            git pull origin main

            echo ">>> Installing and building..."
            yarn install
            yarn build

            echo ">>> Copying package.json and .env..."
            cp package.json build/
            cp .env build/

            echo ">>> Installing production dependencies..."
            cd build
            yarn install

            # ── 2. Empacotar o que está em produção ANTES de substituir ───
            echo ">>> Packing current production into release $RELEASE_NAME..."
            tar -czf $RELEASE_FILE -C $SERVICE .

            # ── 3. Substituir produção pelo novo build ────────────────────
            echo ">>> Deploying new build to services..."
            rm -rf $SERVICE/*
            cp -R $PREBUILD/build/. $SERVICE/

            # ── 4. Limpar pasta build do prebuild ─────────────────────────
            echo ">>> Cleaning prebuild/build..."
            rm -rf $PREBUILD/build

            # ── 5. Manter apenas os 3 últimos releases ────────────────────
            echo ">>> Cleaning old releases..."
            ls -1t $RELEASES_DIR/*.tar.gz | tail -n +4 | xargs -r rm -f

            # ── 6. Reiniciar serviço ──────────────────────────────────────
            echo ">>> Restarting service..."
            sudo systemctl restart bx-whatsapp

            echo ">>> Deploy $RELEASE_NAME completed successfully!"
